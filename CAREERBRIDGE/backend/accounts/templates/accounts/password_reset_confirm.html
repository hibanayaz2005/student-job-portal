<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | CareerBridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.1);
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --text: #e8edf5;
      --muted: #94a3b8;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --radius: 20px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Animated Background Blobs */
    .blob {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      opacity: 0.15;
      animation: move 20s infinite alternate;
    }

    .blob-1 { background: var(--accent); top: -200px; left: -100px; }
    .blob-2 { background: var(--accent2); bottom: -200px; right: -100px; animation-delay: -5s; }

    @keyframes move {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(100px, 50px) scale(1.1); }
    }

    .card {
      width: 100%;
      max-width: 440px;
      padding: 20px;
      z-index: 10;
    }

    .glass-card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .logo {
      font-family: var(--font-head);
      font-size: 32px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 32px;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .title {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 12px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
    }

    .input-field {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      padding: 14px 16px 14px 44px;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-family: var(--font-body);
      transition: all 0.3s;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(0, 229, 255, 0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, #00b8d4 100%);
      color: #000;
      border-radius: 12px;
      border: none;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(0, 229, 255, 0.4);
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ff6b6b;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="glass-card">
      <div class="logo">CareerBridge</div>

      {% if validlink %}
        <h2 class="title">Secure Reset</h2>
        <p class="subtitle">Please enter your new password below.</p>

        {% if error %}
          <div class="error-msg">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
          </div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}
          <div class="form-group">
            <label class="form-label">New Password</label>
            <div class="input-wrapper">
              <input type="password" name="password" class="input-field" placeholder="••••••••" required>
              <i class="fas fa-lock"></i>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <div class="input-wrapper">
              <input type="password" name="confirm_password" class="input-field" placeholder="••••••••" required>
              <i class="fas fa-shield-alt"></i>
            </div>
          </div>
          <button type="submit" class="btn">Update Password</button>
        </form>
      {% else %}
        <div style="text-align:center">
          <i class="fas fa-link-slash" style="font-size:48px;color:rgba(239, 68, 68, 0.5);margin-bottom:20px"></i>
          <h2 class="title" style="color:#ff6b6b">Expired Link</h2>
          <p class="subtitle">This recovery link is no longer valid. Please request a new one.</p>
          <a href="/" class="btn" style="text-decoration:none">Request New Link</a>
        </div>
      {% endif %}

      <a href="/" class="back-link">Return to Home</a>
    </div>
  </div>
</body>
</html>
