<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — CareerBridge</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --surface2: #1a2235;
            --border: #1e2d45;
            --accent: #00e5ff;
            --accent2: #7c3aed;
            --text: #e8edf5;
            --muted: #6b7a99;
            --font-head: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --radius: 16px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .auth-logo {
            font-family: var(--font-head);
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo span { color: var(--text); }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), #3af3ff);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: .3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 229, 255, 0.3);
        }

        .error { color: #ef4444; font-size: 13px; text-align: center; margin-bottom: 16px; }
        .success { color: #10b981; font-size: 13px; text-align: center; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">Career<span>Bridge</span></div>
        
        {% if validlink %}
            <h3 style="text-align:center;margin-bottom:24px;font-family:var(--font-head)">Set New Password</h3>
            
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
            
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="password" class="form-input" required placeholder="Min 8 characters">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-input" required placeholder="Repeat password">
                </div>
                <button type="submit" class="btn">Update Password</button>
            </form>
        {% else %}
            <div style="text-align:center">
                <i class="fas fa-exclamation-triangle" style="font-size:48px;color:var(--accent2);margin-bottom:16px"></i>
                <h3 style="font-family:var(--font-head);margin-bottom:12px">Invalid Link</h3>
                <p style="color:var(--muted);font-size:14px;line-height:1.5">This password reset link is invalid or has expired. Please request a new one.</p>
                <a href="/" style="color:var(--accent);text-decoration:none;font-weight:600;margin-top:20px;display:inline-block">Back to Home</a>
            </div>
        {% endif %}
    </div>
</body>
</html>
