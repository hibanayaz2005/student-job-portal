<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login — CareerBridge</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f6fb; display:flex; align-items:center; justify-content:center; height:100vh; }
    .card { background:white; padding:24px; border-radius:8px; box-shadow:0 6px 20px rgba(0,0,0,0.08); width:360px; }
    .input { width:100%; padding:10px; margin-bottom:12px; border:1px solid #ddd; border-radius:6px; }
    .btn { background:#06b6d4; color:#000; padding:10px 14px; border-radius:6px; border:none; font-weight:700; cursor:pointer; width:100%; }
    .error { color:#ef4444; margin-bottom:10px; }
  </style>
</head>
<body>
  <div class="card">
    <h3 style="margin-bottom:12px;">Sign in to CareerBridge</h3>
    {% if messages %}
      {% for m in messages %}
        <div class="error">{{ m }}</div>
      {% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <input class="input" name="username" placeholder="Username or email" />
      <input class="input" name="password" type="password" placeholder="Password" />
      <button class="btn" type="submit">Sign in</button>
    </form>
    <div style="margin-top:12px;font-size:13px;color:#666;">
      <a href="/accounts/google/" style="display:inline-block;padding:8px 12px;background:#4285F4;color:#fff;border-radius:6px;text-decoration:none;font-weight:600;">Sign in with Google</a>
    </div>
  </div>
</body>
</html>
